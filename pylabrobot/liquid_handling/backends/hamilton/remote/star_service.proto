syntax = "proto3";
package pylabrobot.liquid_handling.backends.hamilton.remote;

// =============================================================================
// Common types
// =============================================================================

message Empty {}
message Coordinate { double x = 1; double y = 2; double z = 3; }
message Rotation   { double x = 1; double y = 2; double z = 3; }

// =============================================================================
// Enums
// =============================================================================

enum LLDMode {
  LLD_OFF = 0;
  LLD_GAMMA = 1;
  LLD_PRESSURE = 2;
  LLD_DUAL = 3;
  LLD_Z_TOUCH_OFF = 4;
}

enum TipPickupMethod {
  OUT_OF_RACK = 0;
  OUT_OF_WASH_LIQUID = 1;
}

enum TipDropMethodEnum {
  PLACE_SHIFT = 0;
  TIP_DROP = 1;
}

enum TipSizeEnum {
  TIP_SIZE_UNDEFINED = 0;
  LOW_VOLUME = 1;
  STANDARD_VOLUME = 2;
  HIGH_VOLUME = 3;
  CORE_384 = 4;
  XL = 5;
}

enum GripDirectionEnum {
  GRIP_FRONT = 0;
  GRIP_BACK = 1;
  GRIP_LEFT = 2;
  GRIP_RIGHT = 3;
}

enum RotationDriveOrientationEnum {
  ROT_LEFT = 0;
  ROT_FRONT = 1;
  ROT_RIGHT = 2;
}

enum WristDriveOrientationEnum {
  WRIST_RIGHT = 0;
  WRIST_STRAIGHT = 1;
  WRIST_LEFT = 2;
  WRIST_REVERSE = 3;
}

enum Barcode1DSymbologyEnum {
  BARCODE_UNKNOWN = 0;
  BARCODE_CODE128 = 1;
  BARCODE_CODE39 = 2;
  BARCODE_CODABAR = 3;
  BARCODE_CODE93 = 4;
  BARCODE_CODE25 = 5;
  BARCODE_EAN128 = 6;
}

// =============================================================================
// Data types
// =============================================================================

message TipData {
  string type = 1;           // "Tip" or "HamiltonTip"
  bool has_filter = 2;
  double total_tip_length = 3;
  double maximal_volume = 4;
  double fitting_depth = 5;
  TipSizeEnum tip_size = 6;
  TipPickupMethod pickup_method = 7;
}

message MixData {
  double volume = 1;
  int32 repetitions = 2;
  double flow_rate = 3;
}

// =============================================================================
// Operation messages (for core LH interface)
// =============================================================================

message PickupOp {
  string resource_name = 1;
  Coordinate offset = 2;
  TipData tip = 3;
}

message DropOp {
  string resource_name = 1;
  Coordinate offset = 2;
  TipData tip = 3;
}

message SingleChannelAspirationOp {
  string resource_name = 1;
  Coordinate offset = 2;
  TipData tip = 3;
  double volume = 4;
  optional double flow_rate = 5;
  optional double liquid_height = 6;
  optional double blow_out_air_volume = 7;
  optional MixData mix = 8;
}

message SingleChannelDispenseOp {
  string resource_name = 1;
  Coordinate offset = 2;
  TipData tip = 3;
  double volume = 4;
  optional double flow_rate = 5;
  optional double liquid_height = 6;
  optional double blow_out_air_volume = 7;
  optional MixData mix = 8;
}

message PickupTipRackOp {
  string resource_name = 1;
  Coordinate offset = 2;
  repeated TipData tips = 3;
  repeated bool tip_present = 4;  // parallel to tips: false = None tip
}

message DropTipRackOp {
  string resource_name = 1;
  Coordinate offset = 2;
}

message MultiHeadAspirationPlateOp {
  repeated string well_names = 1;
  Coordinate offset = 2;
  repeated TipData tips = 3;
  repeated bool tip_present = 4;
  double volume = 5;
  optional double flow_rate = 6;
  optional double liquid_height = 7;
  optional double blow_out_air_volume = 8;
  optional MixData mix = 9;
}

message MultiHeadDispensePlateOp {
  repeated string well_names = 1;
  Coordinate offset = 2;
  repeated TipData tips = 3;
  repeated bool tip_present = 4;
  double volume = 5;
  optional double flow_rate = 6;
  optional double liquid_height = 7;
  optional double blow_out_air_volume = 8;
  optional MixData mix = 9;
}

message MultiHeadAspirationContainerOp {
  string container_name = 1;
  Coordinate offset = 2;
  repeated TipData tips = 3;
  repeated bool tip_present = 4;
  double volume = 5;
  optional double flow_rate = 6;
  optional double liquid_height = 7;
  optional double blow_out_air_volume = 8;
  optional MixData mix = 9;
}

message MultiHeadDispenseContainerOp {
  string container_name = 1;
  Coordinate offset = 2;
  repeated TipData tips = 3;
  repeated bool tip_present = 4;
  double volume = 5;
  optional double flow_rate = 6;
  optional double liquid_height = 7;
  optional double blow_out_air_volume = 8;
  optional MixData mix = 9;
}

message ResourcePickupOp {
  string resource_name = 1;
  Coordinate offset = 2;
  double pickup_distance_from_top = 3;
  GripDirectionEnum direction = 4;
}

message ResourceMoveOp {
  string resource_name = 1;
  Coordinate location = 2;
  GripDirectionEnum gripped_direction = 3;
  double pickup_distance_from_top = 4;
  Coordinate offset = 5;
}

message ResourceDropOp {
  string resource_name = 1;
  Coordinate destination = 2;
  Rotation destination_absolute_rotation = 3;
  Coordinate offset = 4;
  double pickup_distance_from_top = 5;
  GripDirectionEnum pickup_direction = 6;
  GripDirectionEnum direction = 7;
  double rotation = 8;
}

// Dict<int, float> for channel position maps
message ChannelFloatMap {
  map<int32, double> entries = 1;
}

// =============================================================================
// Lifecycle RPCs
// =============================================================================

message SetupRequest {}
message SetupResponse {}

message StopRequest {}
message StopResponse {}

message GetNumChannelsRequest {}
message GetNumChannelsResponse { int32 num_channels = 1; }

message GetHead96InstalledRequest {}
message GetHead96InstalledResponse { bool installed = 1; }

message GetIswapInstalledRequest {}
message GetIswapInstalledResponse { bool installed = 1; }

message GetIswapParkedRequest {}
message GetIswapParkedResponse { bool parked = 1; }

message GetCoreParkedRequest {}
message GetCoreParkedResponse { bool parked = 1; }

// =============================================================================
// Core LH interface RPCs
// =============================================================================

// --- pick_up_tips ---
message PickUpTipsRequest {
  repeated PickupOp ops = 1;
  repeated int32 use_channels = 2;
  optional double begin_tip_pick_up_process = 3;
  optional double end_tip_pick_up_process = 4;
  optional double minimum_traverse_height_at_beginning_of_a_command = 5;
  optional int32 pickup_method = 6;  // TipPickupMethod enum value
}
message PickUpTipsResponse {}

// --- drop_tips ---
message DropTipsRequest {
  repeated DropOp ops = 1;
  repeated int32 use_channels = 2;
  optional int32 drop_method = 3;  // TipDropMethod enum value
  optional double begin_tip_deposit_process = 4;
  optional double end_tip_deposit_process = 5;
  optional double minimum_traverse_height_at_beginning_of_a_command = 6;
  optional double z_position_at_end_of_a_command = 7;
}
message DropTipsResponse {}

// --- aspirate ---
message AspirateRequest {
  repeated SingleChannelAspirationOp ops = 1;
  repeated int32 use_channels = 2;
  repeated bool jet = 3;
  repeated bool blow_out = 4;
  repeated double lld_search_height = 5;
  repeated double clot_detection_height = 6;
  repeated double pull_out_distance_transport_air = 7;
  repeated double second_section_height = 8;
  repeated double second_section_ratio = 9;
  repeated double minimum_height = 10;
  repeated double immersion_depth = 11;
  repeated double surface_following_distance = 12;
  repeated double transport_air_volume = 13;
  repeated double pre_wetting_volume = 14;
  repeated int32 lld_mode = 15;
  repeated int32 gamma_lld_sensitivity = 16;
  repeated int32 dp_lld_sensitivity = 17;
  repeated double aspirate_position_above_z_touch_off = 18;
  repeated double detection_height_difference_for_dual_lld = 19;
  repeated double swap_speed = 20;
  repeated double settling_time = 21;
  repeated double mix_position_from_liquid_surface = 22;
  repeated double mix_surface_following_distance = 23;
  repeated int32 limit_curve_index = 24;
  repeated bool use_2nd_section_aspiration = 25;
  repeated double retract_height_over_2nd_section_to_empty_tip = 26;
  repeated double dispensation_speed_during_emptying_tip = 27;
  repeated double dosing_drive_speed_during_2nd_section_search = 28;
  repeated double z_drive_speed_during_2nd_section_search = 29;
  repeated double cup_upper_edge = 30;
  repeated int32 ratio_liquid_rise_to_tip_deep_in = 31;
  repeated double immersion_depth_2nd_section = 32;
  optional double minimum_traverse_height_at_beginning_of_a_command = 33;
  optional double min_z_endpos = 34;
  repeated double liquid_surface_no_lld = 35;
  bool probe_liquid_height = 36;
  bool auto_surface_following_distance = 37;
  repeated bool disable_volume_correction = 38;
}
message AspirateResponse {}

// --- dispense ---
message DispenseRequest {
  repeated SingleChannelDispenseOp ops = 1;
  repeated int32 use_channels = 2;
  repeated double lld_search_height = 3;
  repeated double liquid_surface_no_lld = 4;
  repeated double pull_out_distance_transport_air = 5;
  repeated double second_section_height = 6;
  repeated double second_section_ratio = 7;
  repeated double minimum_height = 8;
  repeated double immersion_depth = 9;
  repeated double surface_following_distance = 10;
  repeated double cut_off_speed = 11;
  repeated double stop_back_volume = 12;
  repeated double transport_air_volume = 13;
  repeated int32 lld_mode = 14;
  repeated double dispense_position_above_z_touch_off = 15;
  repeated int32 gamma_lld_sensitivity = 16;
  repeated int32 dp_lld_sensitivity = 17;
  repeated double swap_speed = 18;
  repeated double settling_time = 19;
  repeated double mix_position_from_liquid_surface = 20;
  repeated double mix_surface_following_distance = 21;
  repeated int32 limit_curve_index = 22;
  optional double minimum_traverse_height_at_beginning_of_a_command = 23;
  optional double min_z_endpos = 24;
  double side_touch_off_distance = 25;
  repeated bool jet = 26;
  repeated bool blow_out = 27;
  repeated bool empty = 28;
  bool probe_liquid_height = 29;
  bool auto_surface_following_distance = 30;
  repeated bool disable_volume_correction = 31;
}
message DispenseResponse {}

// --- pick_up_tips96 ---
message PickUpTips96Request {
  PickupTipRackOp pickup = 1;
  string tip_pickup_method = 2;  // "from_rack", "from_waste", "full_blowout"
  optional double minimum_height_command_end = 3;
  optional double minimum_traverse_height_at_beginning_of_a_command = 4;
  string experimental_alignment_tipspot_identifier = 5;
}
message PickUpTips96Response {}

// --- drop_tips96 ---
message DropTips96Request {
  DropTipRackOp drop = 1;
  optional double minimum_height_command_end = 2;
  optional double minimum_traverse_height_at_beginning_of_a_command = 3;
  string experimental_alignment_tipspot_identifier = 4;
}
message DropTips96Response {}

// --- aspirate96 ---
message Aspirate96Request {
  // aspiration is either plate or container (oneof)
  oneof aspiration {
    MultiHeadAspirationPlateOp plate = 1;
    MultiHeadAspirationContainerOp container = 2;
  }
  bool jet = 3;
  bool blow_out = 4;
  bool use_lld = 5;
  double pull_out_distance_transport_air = 6;
  int32 aspiration_type = 7;
  optional double minimum_traverse_height_at_beginning_of_a_command = 8;
  optional double min_z_endpos = 9;
  double lld_search_height = 10;
  optional double minimum_height = 11;
  double second_section_height = 12;
  double second_section_ratio = 13;
  double immersion_depth = 14;
  double surface_following_distance = 15;
  double transport_air_volume = 16;
  double pre_wetting_volume = 17;
  int32 gamma_lld_sensitivity = 18;
  double swap_speed = 19;
  double settling_time = 20;
  double mix_position_from_liquid_surface = 21;
  double mix_surface_following_distance = 22;
  int32 limit_curve_index = 23;
  bool disable_volume_correction = 24;
}
message Aspirate96Response {}

// --- dispense96 ---
message Dispense96Request {
  oneof dispense_op {
    MultiHeadDispensePlateOp plate = 1;
    MultiHeadDispenseContainerOp container = 2;
  }
  bool jet = 3;
  bool empty = 4;
  bool blow_out = 5;
  double pull_out_distance_transport_air = 6;
  bool use_lld = 7;
  optional double minimum_traverse_height_at_beginning_of_a_command = 8;
  optional double min_z_endpos = 9;
  double lld_search_height = 10;
  optional double minimum_height = 11;
  double second_section_height = 12;
  double second_section_ratio = 13;
  double immersion_depth = 14;
  double surface_following_distance = 15;
  double transport_air_volume = 16;
  int32 gamma_lld_sensitivity = 17;
  double swap_speed = 18;
  double settling_time = 19;
  double mix_position_from_liquid_surface = 20;
  double mix_surface_following_distance = 21;
  int32 limit_curve_index = 22;
  double cut_off_speed = 23;
  double stop_back_volume = 24;
  bool disable_volume_correction = 25;
}
message Dispense96Response {}

