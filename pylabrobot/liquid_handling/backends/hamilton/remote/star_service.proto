// =============================================================================
// Service definition
// =============================================================================

service STARService {
  // --- Lifecycle ---
  rpc Setup(SetupRequest) returns (SetupResponse);
  rpc Stop(StopRequest) returns (StopResponse);
  rpc GetNumChannels(GetNumChannelsRequest) returns (GetNumChannelsResponse);
  rpc GetHead96Installed(GetHead96InstalledRequest) returns (GetHead96InstalledResponse);
  rpc GetIswapInstalled(GetIswapInstalledRequest) returns (GetIswapInstalledResponse);
  rpc GetIswapParked(GetIswapParkedRequest) returns (GetIswapParkedResponse);
  rpc GetCoreParked(GetCoreParkedRequest) returns (GetCoreParkedResponse);

  // --- Core LH interface ---
  rpc PickUpTips(PickUpTipsRequest) returns (PickUpTipsResponse);
  rpc DropTips(DropTipsRequest) returns (DropTipsResponse);
  rpc Aspirate(AspirateRequest) returns (AspirateResponse);
  rpc Dispense(DispenseRequest) returns (DispenseResponse);
  rpc PickUpTips96(PickUpTips96Request) returns (PickUpTips96Response);
  rpc DropTips96(DropTips96Request) returns (DropTips96Response);
  rpc Aspirate96(Aspirate96Request) returns (Aspirate96Response);
  rpc Dispense96(Dispense96Request) returns (Dispense96Response);

  // --- Single channel pip (low-level) ---
  rpc InitializePip(InitializePipRequest) returns (InitializePipResponse);
  rpc InitializePipettingChannels(InitializePipettingChannelsRequest) returns (InitializePipettingChannelsResponse);
  rpc PickUpTipFw(PickUpTipFwRequest) returns (PickUpTipFwResponse);
  rpc DiscardTipFw(DiscardTipFwRequest) returns (DiscardTipFwResponse);
  rpc AspiratePip(AspiratePipRequest) returns (AspiratePipResponse);
  rpc DispensePip(DispensePipRequest) returns (DispensePipResponse);
  rpc SpreadPipChannels(SpreadPipChannelsRequest) returns (SpreadPipChannelsResponse);
  rpc MoveAllPipettingChannelsToDefinedPosition(MoveAllPipettingChannelsToDefinedPositionRequest) returns (MoveAllPipettingChannelsToDefinedPositionResponse);
  rpc DefineTipNeedle(DefineTipNeedleRequest) returns (DefineTipNeedleResponse);

  // --- TADM / LLD probing ---
  rpc ProbeLiquidHeights(ProbeLiquidHeightsRequest) returns (ProbeLiquidHeightsResponse);
  rpc ProbeLiquidVolumes(ProbeLiquidVolumesRequest) returns (ProbeLiquidVolumesResponse);
  rpc RequestTipPresence(RequestTipPresenceRequest) returns (RequestTipPresenceResponse);
  rpc ChannelsSenseTipPresence(ChannelsSenseTipPresenceRequest) returns (ChannelsSenseTipPresenceResponse);
  rpc RequestPipHeightLastLld(RequestPipHeightLastLldRequest) returns (RequestPipHeightLastLldResponse);
  rpc RequestTadmStatus(RequestTadmStatusRequest) returns (RequestTadmStatusResponse);
  rpc RequestVolumeInTip(RequestVolumeInTipRequest) returns (RequestVolumeInTipResponse);
